backend:
  name: git-gateway
  branch: main

media_folder: "abtconsulting/images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Site Content"
    files:

      - name: "hero"
        label: "Hero Section"
        file: "abtconsulting/_data/hero.json"
        fields:
          - { label: "Location Tag", name: "tag", widget: "string" }
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Headline Accent Word", name: "headline_accent", widget: "string" }
          - { label: "Subtext", name: "subtext", widget: "text" }

      - name: "about"
        label: "About Section"
        file: "abtconsulting/_data/about.json"
        fields:
          - { label: "Paragraph 1", name: "body1", widget: "text" }
          - { label: "Paragraph 2", name: "body2", widget: "text" }

      - name: "services"
        label: "Services"
        file: "abtconsulting/_data/services.json"
        fields:
          - label: "Services List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "why"
        label: "Why Choose Us"
        file: "abtconsulting/_data/why.json"
        fields:
          - label: "Reasons"
            name: "items"
            widget: "list"
            fields:
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "contact"
        label: "Contact Details"
        file: "abtconsulting/_data/contact.json"
        fields:
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Address Line 1", name: "address1", widget: "string" }
          - { label: "Address Line 2", name: "address2", widget: "string" }
          - { label: "Weekday Hours", name: "hours_weekday", widget: "string" }
          - { label: "Weekend Hours", name: "hours_weekend", widget: "string" }
